<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="index.css">
</head>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
    }

    .container {
        display: flex;
        gap: 20px; /* space between buttons */
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background-color: #2196F3;
        color: white;
        transition: background-color 0.3s;
    }

    button:hover {
        background-color: #0b7dda;
    }
</style>
<body>
    <div class="container">
        <button onclick="location.href='Frontend/login.html'">Log In</button>
        <button onclick="location.href='Frontend/signup.html'">Sign Up</button>
    </div>
</body>
</html>
